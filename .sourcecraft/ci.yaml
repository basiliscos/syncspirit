on:
  push:
    - workflows: build-package-workflow

workflows:
  build-package-workflow:
    settings:
        max_cube_duration: 240m
    tasks:
      - [compile-san-n-test, make-win32-build]

tasks:
  - name: compile-san-n-test
    cubes:
      - name: configure
        script:
          - sudo apt update
          - sudo apt install software-properties-common
          - sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          - sudo apt update
          - sudo apt install -y gcc-13 g++-13
          - sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 60
          - sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 60
          - sudo update-alternatives --config gcc
          - sudo update-alternatives --config g++
          - g++ --version
          - gcc --version
          - sudo apt install -y cmake python3-venv pkgconf mold
          - sudo apt install -y libgl1-mesa-dev libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxaw7-dev libxcomposite-dev libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev libxi-dev libxinerama-dev libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev libxrandr-dev libxrender-dev libxres-dev libxss-dev libxt-dev libxtst-dev libxv-dev libxxf86vm-dev libxcb-glx0-dev libxcb-render0-dev libxcb-render-util0-dev libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-sync-dev libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-dri3-dev uuid-dev libxcb-cursor-dev libxcb-dri2-0-dev libxcb-dri3-dev libxcb-present-dev libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev libxcb-util-dev libxcb-util0-dev libglu1-mesa-dev
          - sudo apt install -y libxft-dev
          - python3 -m venv myenv
          - . myenv/bin/activate
          - pip install conan
          - conan profile detect
          - cp .sourcecraft/conan-profile-linux-native /root/.conan2/profiles/linux-native
          - mkdir build.ci && cd build.ci
          - conan install --build=missing --profile=linux-native --output-folder . -s build_type=Debug -o '&:shared=True' ..
          - . ./conanbuild.sh
          - cmake .. -G "Unix Makefiles" -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fuse-ld=mold -fsanitize=undefined -fsanitize=address -fno-omit-frame-pointer"  -DSYNCSPIRIT_BUILD_TESTS=on
      - name: compile
        script:
          - cd build.ci
          - make -j`nproc`
      - name: test
        script:
          - cd build.ci
          - ctest --rerun-failed --output-on-failure .
  - name: make-win32-build
    cubes:
      - name: make-binary
        script:
          - sudo apt update
          - sudo apt install software-properties-common
          - sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          - sudo apt update
          - sudo apt install -y build-essential
          - sudo apt install -y autoconf automake autopoint bash bison bzip2 flex g++ g++-multilib gettext git gperf intltool libc6-dev-i386 libclang-dev libgdk-pixbuf2.0-dev libltdl-dev libgl-dev libpcre2-dev libssl-dev libtool-bin libxml-parser-perl lzip make openssl p7zip-full patch perl python3 python3-mako python3-packaging python3-pkg-resources python3-setuptools python-is-python3 ruby sed sqlite3 unzip wget xz-utils
          - sudo apt install -y curl p7zip-full coreutils zip
          - g++ --version
          - gcc --version
          - git clone --branch build-2022-04-09  --depth 1 https://github.com/mxe/mxe
          - cp .sourcecraft/mxe-settings.mk ./mxe/settings.mk
          - cd mxe
          - make zip
          - find usr/bin
          - export PATH=`pwd`/usr/bin:$PATH
          - cd ..
          - python3 -m venv myenv
          - . myenv/bin/activate
          - pip install conan
          - pip install pefile
          - conan profile detect
          - cp .sourcecraft/conan-profile-xp /root/.conan2/profiles/xp
          - mkdir build.ci && cd build.ci
          - conan install --build=missing --profile=xp --output-folder . -s build_type=Release -o "&:shared=True" ..
          - . ./conanbuild.sh
          - cmake .. -G "Unix Makefiles" -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake -DCMAKE_POLICY_DEFAULT_CMP0091=NEW  -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-D_WIN32_WINNT=0x0501 -DBOOST_ASIO_ENABLE_CANCELIO=1" -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_CROSSCOMPILING=on -DCMAKE_CROSSCOMPILING_EMULATOR=wine
          - make -j`nproc`
          - make -j`nproc` deploy_deps
          - python ../misc/post-install-win32.py --binaries ./dist/*.exe  --dirs $HOME/.conan2 ../mxe/ `pwd`
          - cd dist
          - zip -r9 ../syncspirit-win32.zip *
          - md5sum ../syncspirit-win32.zip
          - echo "going to upload binary"
          - echo `pwd`/syncspirit-win32.zip
          - ls -lah `pwd`/syncspirit-win32.zip
        artifacts:
          paths:
            - ./syncspirit-win32.zip

